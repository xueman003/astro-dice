<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占星骰子辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --paper:  #ede4d0;
  --ink:    #1e1408;
  --ink2:   #3a2a14;
  --ink3:   #5c3d1e;
  --rust:   #8b3a1a;
  --sienna: #c17f3a;
  --sage:   #3d5c38;
  --teal:   #2e5050;
  --cream:  #f5f0e4;
  --card-planet: #0f1e3a;
  --card-sign:   #3a1a0a;
  --card-house:  #0f2e1a;
}
html { height: 100%; }
body {
  font-family: 'IM Fell English','Palatino Linotype',Georgia,serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  background-size:256px 256px; opacity:.5; mix-blend-mode:multiply;
}
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(30,20,8,.2) 100%);
}
.surreal-layer { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.surreal-el    { position:absolute; pointer-events:none; opacity:.05; }

.wrapper {
  position:relative; z-index:1;
  max-width:680px; margin:0 auto;
  padding:3.2rem 1.5rem 5rem;
  display:flex; flex-direction:column; align-items:center;
  gap:2.2rem;
}

/* ── Header ── */
header { text-align:center; }
.header-eye { display:block; margin:0 auto 1.3rem; width:62px; height:62px; }
.title-frame { position:relative; padding:1.1rem 2.3rem; display:inline-block; }
.title-frame::before,.title-frame::after { content:''; position:absolute; left:0; right:0; height:3px; background:repeating-linear-gradient(90deg,var(--ink2) 0,var(--ink2) 6px,transparent 6px,transparent 9px); }
.title-frame::before { top:0; } .title-frame::after { bottom:0; }
.tfs { position:absolute; top:0; bottom:0; width:3px; background:repeating-linear-gradient(180deg,var(--ink2) 0,var(--ink2) 6px,transparent 6px,transparent 9px); }
.tfs.l { left:0; } .tfs.r { right:0; }
h1 { font-family:'Cinzel',serif; font-size:clamp(1.35rem,4vw,2.1rem); font-weight:400; letter-spacing:.18em; color:var(--ink); line-height:1.1; margin-bottom:.28rem; }
.title-zh { font-size:clamp(.8rem,2.5vw,.98rem); letter-spacing:.55em; color:var(--ink3); }
.subtitle { margin-top:.7rem; font-style:italic; font-size:.84rem; color:var(--ink3); opacity:.7; letter-spacing:.04em; }

/* ── Question ── */
.question-section { width:100%; max-width:560px; }
.question-label { display:block; font-size:.64rem; letter-spacing:.22em; color:var(--ink3); margin-bottom:.52rem; text-align:center; font-family:'Cinzel',serif; }
.question-wrap { position:relative; }
.question-input {
  width:100%; background:rgba(255,255,255,.3); border:none;
  border-bottom:1.5px solid var(--ink3); border-top:1.5px solid var(--ink3);
  color:var(--ink); font-family:'IM Fell English',Georgia,serif;
  font-size:1rem; font-style:italic; line-height:1.7;
  padding:.58rem 2.1rem .58rem .82rem; resize:none; outline:none;
  transition:background .3s; min-height:47px;
}
.question-input::placeholder { color:rgba(58,42,20,.3); }
.question-input:focus { background:rgba(255,255,255,.5); }
.clear-btn { position:absolute; right:.58rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--ink3); cursor:pointer; font-size:.78rem; opacity:0; transition:opacity .2s; pointer-events:none; }
.clear-btn.visible { opacity:.5; pointer-events:auto; }

/* ── Roll button ── */
.roll-btn {
  font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:.28em;
  color:var(--cream); background:var(--ink2); border:none;
  padding:.88rem 2.8rem; cursor:pointer; position:relative; overflow:hidden;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  transition:background .22s,transform .14s;
  box-shadow:3px 4px 0 rgba(30,20,8,.25);
}
.roll-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 50%); pointer-events:none; }
.roll-btn:hover   { background:var(--rust); transform:translateY(-2px); box-shadow:3px 6px 0 rgba(30,20,8,.2); }
.roll-btn:active  { transform:translateY(1px); }
.roll-btn:disabled { opacity:.42; cursor:default; transform:none; }

/* ── Three dict cards ── */
.dict-cards {
  width:100%;
  display:flex; flex-direction:column; gap:1rem;
  opacity:0; transform:translateY(12px);
  transition:opacity .5s ease, transform .5s ease;
}
.dict-cards.visible { opacity:1; transform:translateY(0); }

/* Each card */
.dict-card {
  width:100%;
  background:var(--cream);
  border:1.5px solid var(--ink2);
  position:relative; overflow:hidden;
  box-shadow:3px 5px 0 rgba(30,20,8,.1), 6px 10px 0 rgba(30,20,8,.05);
  display:grid;
  grid-template-columns: 100px 1fr;
  min-height:110px;
}
/* inner rule */
.dict-card::after {
  content:''; position:absolute; top:5px; left:5px; right:5px; bottom:5px;
  border:.5px solid var(--ink3); pointer-events:none; opacity:.15;
}

/* Left panel — die + symbol */
.card-left {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:.5rem; padding:.9rem .5rem;
  border-right:1.5px solid var(--ink2);
  position:relative;
}
.card-left.planet { background: rgba(15,30,58,.06); }
.card-left.sign   { background: rgba(58,26,10,.06); }
.card-left.house  { background: rgba(15,46,26,.06); }

/* top color stripe */
.dict-card.planet .card-left::before,
.dict-card.sign   .card-left::before,
.dict-card.house  .card-left::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.dict-card.planet .card-left::before { background:rgba(15,30,58,.5); }
.dict-card.sign   .card-left::before { background:rgba(139,58,26,.6); }
.dict-card.house  .card-left::before { background:rgba(46,80,46,.5); }

.card-type {
  font-family:'Cinzel',serif; font-size:.52rem; letter-spacing:.22em;
  opacity:.5; color:var(--ink2);
}
.card-symbol { font-size:2.4rem; line-height:1; color:var(--ink2); }
.card-name   { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em; color:var(--ink2); text-align:center; }

/* Right panel — dict content */
.card-right {
  padding:.9rem 1.1rem .9rem 1rem;
  display:flex; flex-direction:column; gap:.52rem;
}
.card-keyword {
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.08em;
  color:var(--ink); font-weight:500;
  padding-bottom:.38rem;
  border-bottom:1px solid rgba(58,42,20,.15);
}
.card-meaning {
  font-size:.88rem; line-height:1.75; color:var(--ink2); font-style:italic;
}
.card-guide-label {
  font-family:'Cinzel',serif; font-size:.52rem; letter-spacing:.2em;
  color:var(--rust); opacity:.75; margin-top:.1rem;
}
.card-guide {
  font-size:.82rem; line-height:1.65; color:var(--ink3);
}

/* rolling state */
.dict-card.rolling .card-symbol { animation:pulse-symbol .5s ease-in-out infinite alternate; }
@keyframes pulse-symbol {
  from { opacity:.3; transform:scale(.88); }
  to   { opacity:.8; transform:scale(1.08); }
}

/* ── Question echo ── */
.question-echo {
  width:100%; max-width:560px;
  text-align:center; font-size:.82rem; font-style:italic;
  color:var(--ink3); opacity:.65; line-height:1.6;
  display:none;
}
.question-echo.visible { display:block; }

/* ── Ornament ── */
.ornament {
  display:flex; align-items:center; gap:1rem;
  width:100%; max-width:540px;
  opacity:0; transition:opacity .7s ease .25s;
}
.ornament.visible { opacity:1; }
.ornament-line { flex:1; height:1px; background:repeating-linear-gradient(90deg,var(--ink3) 0,var(--ink3) 3px,transparent 3px,transparent 7px); opacity:.28; }
.ornament-glyph { color:var(--rust); font-size:.9rem; opacity:.6; }

/* ── History ── */
.history-section { width:100%; }
.history-title { font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.3em; color:var(--ink3); text-align:center; margin-bottom:.65rem; opacity:.4; }
.history-list  { display:flex; flex-direction:column; gap:.3rem; }
.history-item  { display:flex; align-items:center; gap:.8rem; padding:.42rem .78rem; border-bottom:1px solid rgba(58,42,20,.1); font-size:.78rem; color:rgba(58,42,20,.46); cursor:pointer; transition:all .18s; font-style:italic; }
.history-item:hover { color:var(--ink2); background:rgba(255,255,255,.38); }
.history-syms { font-size:.88rem; flex-shrink:0; opacity:.52; font-style:normal; letter-spacing:.06em; }
.history-q    { flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

footer { font-size:.67rem; letter-spacing:.18em; color:var(--ink3); opacity:.27; text-align:center; font-style:italic; }

@media (max-width:500px) {
  .dict-card { grid-template-columns:80px 1fr; }
  .card-symbol { font-size:2rem; }
  .card-right { padding:.75rem .85rem .75rem .8rem; }
}
</style>
</head>

<script>
// ══════════════════════════════════════════════
//  占星辞典数据库
//  每个条目：symbol / name / keyword / meaning / guide
//  meaning = 这个骰子的本质含义（是什么）
//  guide   = 拿到这个骰子后，要往哪里看
// ══════════════════════════════════════════════

const PLANETS = [
  {
    symbol: '☉', name: '太阳',
    keyword: '驱动力 · 整体结构 · 起因',
    meaning: '太阳是能量的源泉，代表整件事的驱动过程。它告诉你这件事整体是怎么发生的，核心动力来自哪里。',
    guide: '从最宏观、最整体的角度看这件事是如何被推动的；若是猜测某个物体，注意最明显、最开放的特征。',
  },
  {
    symbol: '☽', name: '月亮',
    keyword: '过去 · 历史惯性 · 曾经',
    meaning: '月亮代表"过去时"。这里呈现的不是当下的新状态，而是由历史积淀而来的惯性与延续。',
    guide: '把问题放到"以前发生过什么"的视角下来看；现在的状态，很可能是过去某件事留下的结果。',
  },
  {
    symbol: '☿', name: '水星',
    keyword: '信息 · 文字 · 沟通 · 数量',
    meaning: '水星的核心是"信息"。它指向事物中可以被言说、被记录、被传递的那一层——文字、数字、内容。',
    guide: '关注这件事里的沟通细节：说了什么、写了什么、传递了什么；或者关注某个具体的数字与内容。',
  },
  {
    symbol: '♀', name: '金星',

//  UI 逻辑
// ══════════════════════════════════════════════
let rolling = false;
let history = [];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function onQInput() {
  document.getElementById('clearBtn').classList.toggle('visible', document.getElementById('questionInput').value.length > 0);
}
function clearQ() {
  document.getElementById('questionInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('questionInput').focus();
}

function setCard(type, data) {
  document.getElementById(type[0]+'Symbol').textContent = data.symbol;
  document.getElementById(type[0]+'Name').textContent   = data.name;
  document.getElementById(type[0]+'Keyword').textContent= data.keyword;
  document.getElementById(type[0]+'Meaning').textContent= data.meaning;
  document.getElementById(type[0]+'Guide').textContent  = data.guide;
}

async function roll() {
  if (rolling) return;
  rolling = true;

  const btn   = document.getElementById('rollBtn');
  const cards = document.getElementById('dictCards');
  btn.disabled = true;
  btn.textContent = '星象运转中…';

  // rolling animation
  ['cardPlanet','cardSign','cardHouse'].forEach(id => document.getElementById(id).classList.add('rolling'));
  cards.classList.remove('visible');
  document.getElementById('ornament').classList.remove('visible');

  await delay(680);

  const planet = pick(PLANETS);
  const sign   = pick(SIGNS);
  const house  = pick(HOUSES);

  ['cardPlanet','cardSign','cardHouse'].forEach(id => document.getElementById(id).classList.remove('rolling'));

  setCard('p', planet);
  setCard('s', sign);
  setCard('h', house);

  const question = document.getElementById('questionInput').value.trim();
  const echo = document.getElementById('questionEcho');
  if (question) { echo.textContent = '问：' + question; echo.classList.add('visible'); }
  else          { echo.textContent = ''; echo.classList.remove('visible'); }

  document.getElementById('ornament').classList.add('visible');
  await delay(40);
  cards.classList.add('visible');

  addToHistory(planet, sign, house, question);

  btn.disabled = false;
  btn.innerHTML = '✦ 再 次 投 掷 ✦';
  rolling = false;
}

function addToHistory(planet, sign, house, question) {
  history.unshift({ planet, sign, house, question });
  if (history.length > 6) history.pop();
  const sec  = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length > 1) {
    sec.style.display = 'block';
    list.innerHTML = history.slice(1).map((h, i) => `
      <div class="history-item" onclick="showHistory(${i+1})">
        <span class="history-syms">${h.planet.symbol} ${h.sign.symbol} ${h.house.symbol}</span>
        <span class="history-q">${h.question ? '问：' + h.question.substring(0,16)+(h.question.length>16?'…':'') + ' · ' : ''}${h.planet.name} · ${h.sign.name} · ${h.house.name}</span>
      </div>`).join('');
  }
}

async function showHistory(index) {
  const h     = history[index];
  if (!h) return;
  const cards = document.getElementById('dictCards');
  cards.classList.remove('visible');
  await delay(260);

  setCard('p', h.planet);
  setCard('s', h.sign);
  setCard('h', h.house);

  const echo = document.getElementById('questionEcho');
  if (h.question) { echo.textContent = '问：' + h.question; echo.classList.add('visible'); }
  else            { echo.textContent = ''; echo.classList.remove('visible'); }

  await delay(40);
  cards.classList.add('visible');
  cards.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
